name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Naya version use kar rahe hain behtar compatibility ke liye

      - name: Install dependencies (Deep Clean Fix)
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --legacy-peer-deps
          # Tailwind ki native bindings ko fix karne ke liye
          npm install @tailwindcss/oxide-linux-x64-gnu --save-dev --force --legacy-peer-deps
          npm install @types/node @types/express --save-dev --force --legacy-peer-deps

      - name: Build web app
        run: |
          npm run build || npx vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli --force --legacy-peer-deps
          npx cap init AgamNursery com.agam.nursery --web-dir dist --force
          npx cap add android || true
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Agam-Nursery-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
