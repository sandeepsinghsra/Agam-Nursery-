name: Build APK (Master Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Force Install)
        run: |
          rm -rf node_modules package-lock.json
          # Sabse pehle core dependencies install karein
          npm install --force --legacy-peer-deps
          # Missing modules jo error de rahe hain, unhe manually add karein
          npm install @tailwindcss/vite vite better-sqlite3 express @types/node --save-dev --force --legacy-peer-deps

      - name: Build web app
        run: |
          # TypeScript errors ko ignore karke build nikalna
          npx vite build || (echo "Vite failed, trying backup build..." && npm run build --if-present)

      - name: Setup Java 21 (Required for your project)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli --force --legacy-peer-deps
          rm -rf android
          npx cap init AgamNursery com.agam.nursery --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin & Gradle
        run: |
          # Java 21 compatibility force karna
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          
          # Duplicate class fix
          sed -i '/dependencies {/i \
          configurations.all {\
              resolutionStrategy.eachDependency { DependencyResolveDetails details -> \
                  if (details.requested.group == "org.jetbrains.kotlin") {\
                      details.useVersion "1.8.22"\
                  }\
              }\
          }' android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Agam-Nursery-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
