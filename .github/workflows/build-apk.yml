name: Build APK (Tailwind Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Deep Clean)
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --legacy-peer-deps
          # Tailwind ke purane stable version aur PostCSS ko install karna
          npm install tailwindcss postcss autoprefixer --save-dev --force --legacy-peer-deps
          npm install better-sqlite3 express vite @types/node --save-dev --force --legacy-peer-deps

      - name: Build web app (Clean Build)
        run: |
          # TypeScript check skip karke direct Vite build chalana taaki CSS error na aaye
          npx vite build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli --force --legacy-peer-deps
          rm -rf android
          npx cap init AgamNursery com.agam.nursery --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Fix Duplicate Kotlin Classes
        run: |
          sed -i '/dependencies {/i \
          configurations.all {\
              resolutionStrategy.eachDependency { DependencyResolveDetails details -> \
                  if (details.requested.group == "org.jetbrains.kotlin") {\
                      details.useVersion "1.8.22"\
                  }\
              }\
          }' android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          export JAVA_HOME=$JAVA_HOME_21_X64
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Agam-Nursery-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
