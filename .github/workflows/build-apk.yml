name: Build APK (Final Stability Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (Stable Version)
        run: |
          rm -rf node_modules package-lock.json
          npm install --force --legacy-peer-deps
          # Tailwind ka wo version jo 'devSourcemap' error nahi deta
          npm install @tailwindcss/vite@4.0.0-alpha.24 vite@5.0.0 --save-dev --force --legacy-peer-deps
          npm install better-sqlite3 express @types/node --save-dev --force --legacy-peer-deps

      - name: Build web app
        run: |
          # Sabse pehle static files generate karna
          npm run build || npx vite build

      - name: Setup Java 17 (More Stable for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli --force --legacy-peer-deps
          rm -rf android
          npx cap init AgamNursery com.agam.nursery --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin & Java Version Clash
        run: |
          # Java 17/21 compatibility fix
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          
          # Kotlin duplicate class fix
          sed -i '/dependencies {/i \
          configurations.all {\
              resolutionStrategy.eachDependency { DependencyResolveDetails details -> \
                  if (details.requested.group == "org.jetbrains.kotlin") {\
                      details.useVersion "1.8.22"\
                  }\
              }\
          }' android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Agam-Nursery-Working-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
