name: Build APK (Final Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (Deep Fix)
        run: |
          rm -rf node_modules package-lock.json
          # Sabse pehle force install taaki dependency conflict na ho
          npm install --force --legacy-peer-deps
          # Missing Vite aur Tailwind plugins ko manually add karna
          npm install @tailwindcss/vite vite better-sqlite3 express @types/node --save-dev --force --legacy-peer-deps

      - name: Build Web App
        run: |
          # TypeScript errors ko ignore karke direct Vite build
          npx vite build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # Aapka project Java 21 maang raha hai

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli --force --legacy-peer-deps
          rm -rf android
          npx cap init AgamNursery com.agam.nursery --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Fix Kotlin Duplicate Classes & Java Home
        run: |
          # Gradle ko batana ki Java 21 hi use kare
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
          
          # Kotlin duplicate class error ka pakka ilaaj
          sed -i '/dependencies {/i \
          configurations.all {\
              resolutionStrategy.eachDependency { DependencyResolveDetails details -> \
                  if (details.requested.group == "org.jetbrains.kotlin") {\
                      details.useVersion "1.8.22"\
                  }\
              }\
          }' android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Agam-Nursery-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
